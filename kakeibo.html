<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家計簿集計ツール</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; margin: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 700px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin: auto; }
        h2 { border-bottom: 2px solid #007bff; padding-bottom: 10px; color: #007bff; }
        .form-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 150px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f8f9fa; }
        .copy-area { margin-top: 20px; background: #fff3cd; padding: 15px; border-radius: 4px; border: 1px solid #ffeeba; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-size: 12px; background: white; padding: 10px; border: 1px solid #ddd; }
        .btn-copy { background-color: #28a745; margin-top: 10px; }
        .btn-copy:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>家計簿データ入力</h2>
    
    <div class="form-row">
        <div class="form-group">
            <label>日付</label>
            <input type="date" id="dateInput">
        </div>
        <div class="form-group">
            <label>人（名前）</label>
            <input type="text" id="personInput" placeholder="例：父、母">
        </div>
    </div>
    
    <div class="form-row">
        <div class="form-group">
            <label>項目</label>
            <select id="categoryInput">
                <option value="家">家</option>
                <option value="Switch2">Switch2</option>
                <option value="タイヤ">タイヤ</option>
                <option value="ブーツ 禅ウェア">ブーツ 禅ウェア</option>
                <option value="スノボ">スノボ</option>
                <option value="ニーサ">ニーサ</option>
                <option value="車保険">車保険</option>
                <option value="月々追加分">月々追加分</option>
            </select>
        </div>
        <div class="form-group">
            <label>金額 (円)</label>
            <input type="number" id="amountInput" placeholder="金額を入力">
        </div>
    </div>

    <button onclick="addData()">リストに追加</button>

    <table id="dataTable">
        <thead>
            <tr>
                <th>日付</th>
                <th>人</th>
                <th>項目</th>
                <th>金額</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="copy-area">
        <label>【エクセル貼り付け用（人・項目別）】</label>
        <p style="font-size: 11px; color: #856404;">コピーしてExcelのA1セルなどで貼り付け（Ctrl+V）してください</p>
        <pre id="outputArea">日付	人	項目	金額</pre>
        <button class="btn-copy" onclick="copyToClipboard()">内容をコピーする</button>
    </div>
</div>

<script>
    // 初期設定：今日の日付をセット
    document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];

    let dataList = [];

    function addData() {
        const date = document.getElementById('dateInput').value;
        const person = document.getElementById('personInput').value || "-";
        const category = document.getElementById('categoryInput').value;
        const amount = document.getElementById('amountInput').value;

        if (!amount) {
            alert("金額を入力してください");
            return;
        }

        dataList.push({ date, person, category, amount });

        updateTable();
        updateOutput();
        
        // 入力欄をリセット（日付と名前はそのまま維持して連続入力を楽に）
        document.getElementById('amountInput').value = "";
    }

    function updateTable() {
        const tbody = document.querySelector("#dataTable tbody");
        tbody.innerHTML = "";
        dataList.forEach(item => {
            const row = `<tr><td>${item.date}</td><td>${item.person}</td><td>${item.category}</td><td>${Number(item.amount).toLocaleString()}</td></tr>`;
            tbody.innerHTML += row;
        });
    }

    function updateOutput() {
        const output = document.getElementById('outputArea');
        let text = "日付\t人\t項目\t金額\n"; 
        dataList.forEach(item => {
            text += `${item.date}\t${item.person}\t${item.category}\t${item.amount}\n`;
        });
        output.textContent = text;
    }

    function copyToClipboard() {
        const text = document.getElementById('outputArea').textContent;
        navigator.clipboard.writeText(text).then(() => {
            alert("コピー完了！エクセルにそのまま貼り付けられます。");
        });
    }
</script>

</body>
</html>
