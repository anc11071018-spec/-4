<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家計簿ツール（固定表形式）</title>
    <style>
        body { font-family: sans-serif; margin: 10px; background-color: #f4f7f6; color: #333; font-size: 14px; }
        .container { max-width: 100%; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin: auto; box-sizing: border-box; }
        h2 { border-bottom: 2px solid #007bff; padding-bottom: 5px; color: #007bff; font-size: 18px; margin-top: 0; }
        .form-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: nowrap; }
        .form-group { flex: 1; min-width: 0; }
        label { display: block; margin-bottom: 3px; font-weight: bold; font-size: 12px; }
        select, input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px; height: 38px; }
        button { background-color: #007bff; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; height: 40px; }
        button:hover { background-color: #0056b3; }
        .copy-area { margin-top: 15px; background: #fff3cd; padding: 10px; border-radius: 4px; border: 1px solid #ffeeba; }
        .copy-area label { font-size: 11px; color: #856404; }
        pre { white-space: pre; word-wrap: normal; font-size: 11px; background: white; padding: 10px; border: 1px solid #ddd; overflow-x: auto; margin: 5px 0 10px 0; }
        .btn-copy { background-color: #28a745; margin-top: 0; font-size: 14px; }
        .btn-copy:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>家計簿入力</h2>
    
    <div class="form-row">
        <div class="form-group">
            <label>日付</label>
            <input type="date" id="dateInput">
        </div>
        <div class="form-group">
            <label>人（名前）</label>
            <select id="personInput">
                <option value="吉田">吉田</option>
                <option value="大森">大森</option>
                <option value="田中">田中</option>
                <option value="鈴木">鈴木</option>
            </select>
        </div>
    </div>
    
    <div class="form-row">
        <div class="form-group" style="flex: 1.5;">
            <label>項目</label>
            <select id="categoryInput">
                <option value="家">家</option>
                <option value="Switch2">Switch2</option>
                <option value="タイヤ">タイヤ</option>
                <option value="ブーツ 禅ウェア">ブーツ 禅ウェア</option>
                <option value="スノボ">スノボ</option>
                <option value="ニーサ">ニーサ</option>
                <option value="車保険">車保険</option>
                <option value="月々追加分">月々追加分</option>
            </select>
        </div>
        <div class="form-group">
            <label>金額</label>
            <input type="number" id="amountInput" placeholder="金額入力">
        </div>
    </div>

    <button onclick="addData()">データ追加</button>

    <div class="copy-area">
        <label>【表形式プレビュー（そのままコピーしてスプレッドシートへ）】</label>
        <pre id="outputArea"></pre>
        <button class="btn-copy" onclick="copyToClipboard()">表形式でコピー</button>
    </div>
</div>

<script>
    // 初期設定：今日の日付
    document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
    
    // 固定する縦軸と横軸
    const targetPeople = ["吉田", "大森", "田中", "鈴木"];
    const targetCategories = ["家", "Switch2", "タイヤ", "ブーツ 禅ウェア", "スノボ", "ニーサ", "車保険", "月々追加分"];
    
    // データを保存するオブジェクト（ブラウザを閉じるまで保持）
    let storage = {}; 

    function addData() {
        const date = document.getElementById('dateInput').value;
        const person = document.getElementById('personInput').value;
        const category = document.getElementById('categoryInput').value;
        const amount = document.getElementById('amountInput').value;

        if (!amount) { alert("金額を入力してください"); return; }

        // データ構造の作成：storage["吉田"]["家"] = "1000"
        if (!storage[person]) storage[person] = {};
        storage[person][category] = amount;

        updateOutput();
        
        // 金額欄だけクリア（連続入力を楽にするため）
        document.getElementById('amountInput').value = "";
    }

    function updateOutput() {
        const output = document.getElementById('outputArea');
        
        // 1行目：ヘッダー行（最初のセルは空白、その隣から項目名）
        let text = "\t" + targetCategories.join("\t") + "\n";
        
        // 2行目以降：各人ごとのデータ行
        targetPeople.forEach(person => {
            // 行の最初はその人の名前
            let rowText = person + "\t";
            
            // 各項目について、データがあれば入れ、なければ空白にする
            const rowDataArray = targetCategories.map(cat => {
                let val = (storage[person] && storage[person][cat]) ? storage[person][cat] : "";
                return val;
            });
            
            // タブ区切りで結合
            text += rowText + rowDataArray.join("\t") + "\n";
        });
        
        output.textContent = text;
    }

    function copyToClipboard() {
        const text = document.getElementById('outputArea').textContent;
        navigator.clipboard.writeText(text).then(() => {
            alert("コピー完了！スプレッドシートに貼り付けてください。");
        });
    }

    // 最初に空白の表を表示しておく
    updateOutput();
</script>

</body>
</html>
