<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家計簿集計ツール（固定フォーマット版）</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 800px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin: auto; }
        h2 { border-bottom: 2px solid #007bff; padding-bottom: 10px; color: #007bff; }
        .form-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 150px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f8f9fa; }
        .copy-area { margin-top: 20px; background: #fff3cd; padding: 15px; border-radius: 4px; border: 1px solid #ffeeba; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-size: 12px; background: white; padding: 10px; border: 1px solid #ddd; overflow-x: auto; }
        .btn-copy { background-color: #28a745; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>家計簿入力</h2>
    
    <div class="form-row">
        <div class="form-group">
            <label>日付</label>
            <input type="date" id="dateInput">
        </div>
        <div class="form-group">
            <label>人（名前）</label>
            <select id="personInput">
                <option value="吉田">吉田</option>
                <option value="大森">大森</option>
                <option value="田中">田中</option>
                <option value="鈴木">鈴木</option>
            </select>
        </div>
    </div>
    
    <div class="form-row">
        <div class="form-group">
            <label>項目</label>
            <select id="categoryInput">
                <option value="家">家</option>
                <option value="Switch2">Switch2</option>
                <option value="タイヤ">タイヤ</option>
                <option value="ブーツ 禅ウェア">ブーツ 禅ウェア</option>
                <option value="スノボ">スノボ</option>
                <option value="ニーサ">ニーサ</option>
                <option value="車保険">車保険</option>
                <option value="月々追加分">月々追加分</option>
            </select>
        </div>
        <div class="form-group">
            <label>金額</label>
            <input type="number" id="amountInput" placeholder="金額入力">
        </div>
    </div>

    <button onclick="addData()">データ追加</button>

    <div class="copy-area">
        <label>【エクセル貼り付け用プレビュー】</label>
        <pre id="outputArea"></pre>
        <button class="btn-copy" onclick="copyToClipboard()">エクセル形式でコピー</button>
    </div>
</div>

<script>
    // 初期設定
    document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
    
    const targetPeople = ["吉田", "大森", "田中", "鈴木"];
    const targetCategories = ["家", "Switch2", "タイヤ", "ブーツ 禅ウェア", "スノボ", "ニーサ", "車保険", "月々追加分"];
    
    // データを保存する構造
    let storage = {}; 

    function addData() {
        const date = document.getElementById('dateInput').value;
        const person = document.getElementById('personInput').value;
        const category = document.getElementById('categoryInput').value;
        const amount = document.getElementById('amountInput').value;

        if (!amount) { alert("金額を入力してください"); return; }

        // 名前と項目をキーにして保存
        if (!storage[person]) storage[person] = {};
        storage[person][category] = amount;

        updateOutput();
        document.getElementById('amountInput').value = "";
    }

    function updateOutput() {
        const output = document.getElementById('outputArea');
        
        // 1行目：ヘッダー（項目名）
        let text = "名前\t" + targetCategories.join("\t") + "\n";
        
        // 2行目以降：各人ごとの数値
        targetPeople.forEach(person => {
            let row = person + "\t";
            let rowData = [];
            targetCategories.forEach(cat => {
                let val = (storage[person] && storage[person][cat]) ? storage[person][cat] : "";
                rowData.push(val);
            });
            text += row + rowData.join("\t") + "\n";
        });
        
        output.textContent = text;
    }

    function copyToClipboard() {
        const text = document.getElementById('outputArea').textContent;
        navigator.clipboard.writeText(text).then(() => {
            alert("コピーしました！エクセルに貼り付けてください。");
        });
    }

    // 初回表示
    updateOutput();
</script>

</body>
</html>
